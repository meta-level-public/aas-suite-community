<div class="p-3 flex flex-col gap-3" style="min-height: 300px">
  <div class="flex gap-2 items-center">
    <input
      pInputText
      [(ngModel)]="query"
      placeholder="{{ 'SEARCH_TERM' | translate }}"
      class="w-full"
      (keydown.enter)="doSearch()"
    />
    <p-button
      label="{{ 'SEARCH' | translate }}"
      icon="pi pi-search"
      (onClick)="doSearch()"
      [loading]="loading()"
    ></p-button>
    @if (hits().length) {
      <div class="flex items-center gap-1">
        <p-button
          icon="pi pi-angle-left"
          styleClass="p-button-text p-button-rounded"
          (onClick)="prev()"
          [disabled]="!hits().length"
        ></p-button>
        <span>{{ lastIndex() + 1 || 0 }}/{{ hits().length }}</span>
        <p-button
          icon="pi pi-angle-right"
          styleClass="p-button-text p-button-rounded"
          (onClick)="next()"
          [disabled]="!hits().length"
        ></p-button>
        <p-button
          styleClass="p-button-text"
          icon="pi pi-eraser"
          label="{{ 'primeng.clear' | translate }}"
          (onClick)="clearHighlight()"
        ></p-button>
      </div>
    }
  </div>

  <p-table [value]="hits()" [loading]="loading()" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[10, 20, 50]">
    <ng-template #header>
      <tr>
        <th>{{ 'SUBMODEL' | translate }}</th>
        <th>{{ 'IDSHORT_PATH' | translate }}</th>
        <th>{{ 'VALUE' | translate }}</th>
        <th style="width: 1%"></th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row.submodelIdShort }}</td>
        <td>
          <code>{{ row.idShortPath }}</code>
        </td>
        <td>{{ row.snippet }}</td>
        <td>
          <p-button icon="pi pi-arrow-right" (onClick)="select(row)" styleClass="p-button-sm"></p-button>
        </td>
      </tr>
    </ng-template>
  </p-table>

  <div class="flex justify-end gap-2">
    <p-button label="{{ 'CLOSE' | translate }}" styleClass="p-button-outlined" (onClick)="close()"></p-button>
  </div>
</div>
