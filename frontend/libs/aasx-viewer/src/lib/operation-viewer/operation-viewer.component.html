<p-table [value]="[' ']" size="small" stripedRows>
  <ng-template pTemplate="body">
    <tr>
      <td class="w-10rem">{{ 'TYPE' | translate }}</td>
      <td class="font-bold">{{ 'OPERATION_ELEMENT' | translate }}</td>
    </tr>
    <tr>
      <td class="w-10rem">{{ 'ID_SHORT' | translate }}</td>
      <td class="font-bold">{{ entity.idShort }}</td>
    </tr>
    @if (entity.inputVariable?.length > 0) {
      <tr>
        <td colspan="2">
          <aas-operation-variable [variables]="entity.inputVariable" title="INPUT_VARIABLES"></aas-operation-variable>
        </td>
      </tr>
    }
    @if (entity.outputVariable?.length > 0) {
      <tr>
        <td colspan="2">
          <aas-operation-variable [variables]="entity.outputVariable" title="OUTPUT_VARIABLES"></aas-operation-variable>
        </td>
      </tr>
    }
    @if (entity.inoutputVariable?.length > 0) {
      <tr>
        <td colspan="2">
          <aas-operation-variable
            [variables]="entity.inoutputVariable"
            title="INOUT_VARIABLES"
          ></aas-operation-variable>
        </td>
      </tr>
    }
  </ng-template>
</p-table>
