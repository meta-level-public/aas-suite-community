<p-table [value]="[' ']" size="small" stripedRows>
  <ng-template pTemplate="body">
    @for (elementItem of entity.keys | objectValue; track elementItem) {
      <tr>
        <td>
          {{ elementItem.type }}
        </td>
        <td class="font-bold">
          {{ elementItem.value }}
        </td>
      </tr>
    }
  </ng-template>
  <ng-template pTemplate="emptymessage" let-columns>
    <tr>
      <td [attr.colspan]="columns.length">{{ 'NO_DATA_FOUND' | translate }}</td>
    </tr>
  </ng-template>
</p-table>
