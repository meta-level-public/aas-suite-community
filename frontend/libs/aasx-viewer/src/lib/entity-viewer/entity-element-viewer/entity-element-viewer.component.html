@if (entity.asset) {
  <p-table [value]="[' ']" size="small" stripedRows>
    <ng-template pTemplate="body">
      <tr>
        <td class="w-10rem">{{ 'TYPE' | translate }}</td>
        <td class="font-bold">{{ 'ENTITY_ELEMENT' | translate }}</td>
      </tr>
      <tr>
        <td class="w-10rem">{{ 'ID_SHORT' | translate }}</td>
        <td class="font-bold">{{ entity.idShort }}</td>
      </tr>
      <tr>
        <td class="w-10rem">{{ 'ASSET' | translate }}</td>
        <td class="font-bold">{{ entity.asset.keys[0].value }}</td>
      </tr>
    </ng-template>
  </p-table>
}
