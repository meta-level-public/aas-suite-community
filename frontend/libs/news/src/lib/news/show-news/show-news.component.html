<div content>
  <p-table
    #dt
    [value]="newsItemList"
    sortField="date"
    [sortOrder]="-1"
    [rows]="8"
    [rowsPerPageOptions]="[10, 20]"
    [paginator]="true"
    [filterDelay]="0"
    size="small"
  >
    <ng-template #header>
      <tr>
        <th pSortableColumn="new" id="new">{{ 'NEU' | translate }}</th>
        <th pSortableColumn="date" id="date">{{ 'DATUM' | translate }}<p-sortIcon field="date"></p-sortIcon></th>
        <th id="description" style="width: 50%">{{ 'BESCHREIBUNG' | translate }}</th>
        <th id="public" style="width: 50%">{{ 'IS_PUBLIC' | translate }}</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-newsItem>
      <tr
        (click)="selectedNewsItem = newsItem; displayNewsDetail = true; seenNewsItem(newsItem, true)"
        [ngStyle]="hasUserSeenNews(newsItem) ? { 'font-weight': 'normal' } : { 'font-weight': 'bold' }"
      >
        <td>
          <p-button
            pRipple
            (onClick)="seenNewsItem(newsItem)"
            [icon]="getIcon(newsItem)"
            styleClass="p-button-rounded p-button-text"
          ></p-button>
        </td>
        <td><span class="p-column-title" date="newsItem.date"></span>{{ newsItem.date | vwsDate: 'SHORT_DATE' }}</td>
        <td><span class="p-column-title" description="newsItem.description"></span>{{ newsItem.description }}</td>
        <td>
          <p-tag
            [value]="newsItem.isPublic ? ('IS_PUBLIC' | translate) : ('IS_NOT_PUBLIC' | translate)"
            [severity]="newsItem.isPublic ? 'success' : 'warn'"
          ></p-tag>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
@if (isUserAdmin() == true) {
  <div>
    <p-button
      #thenBlock
      ntype="button"
      label="{{ 'EDIT_NEWS' | translate }}"
      styleClass="edit-button"
      (onClick)="editNews()"
    ></p-button>
  </div>
}

<p-dialog
  [header]="selectedNewsItem?.description ?? ''"
  [(visible)]="displayNewsDetail"
  [modal]="true"
  [style]="{ width: '50vw', height: '50vh' }"
  [maximizable]="true"
  appendTo="body"
>
  <ng-template pTemplate>
    <p-editor
      [ngModel]="selectedNewsItem?.text"
      [style]="{ height: '100%', width: '100%' }"
      class="news-editor"
      [readonly]="true"
    >
      <ng-template #header>{{ selectedNewsItem?.date | vwsDate }}</ng-template>
    </p-editor>
  </ng-template>
</p-dialog>
