<div class="news-sequence">
  <div class="hero-section news-shell-header">
    <div class="hero-content news-shell-header-content">
      <div>
        <h2 class="hero-title news-shell-title">{{ 'NEWS_INFO' | translate }}</h2>
        <p class="hero-subtitle news-shell-subtitle">{{ 'NEWS_DIALOG_EXPL' | translate }}</p>
      </div>
      <div class="news-shell-toggle">
        <p-checkbox
          inputId="show-read-news"
          [ngModel]="showReadNews()"
          (ngModelChange)="toggleShowReadNews($event)"
          [binary]="true"
        ></p-checkbox>
        <label for="show-read-news" class="text-sm text-[var(--p-text-color)]">{{ 'NEWS_SHOW_READ' | translate }}</label>
      </div>
    </div>
  </div>

  @if (currentNewsItem(); as newsItem) {
    <div class="news-card" [class.news-card-animate]="animateCard()">
      <div class="news-header">
        <div>
          <h2 class="news-title">{{ newsItem.description }}</h2>
          <div class="news-date">{{ newsItem.date | vwsDate }}</div>
        </div>
        @if (hasVisibleNews()) {
          <div class="news-progress">{{ progressLabel() }}</div>
        }
      </div>

      <div class="news-content-surface">
        <div class="news-content prose max-w-none" [innerHTML]="newsItem.text || ''"></div>
      </div>

      <div class="news-actions">
        <p-button
          [label]="isLastVisibleNews() ? ('CLOSE' | translate) : ('NEXT' | translate)"
          icon="pi pi-arrow-right"
          iconPos="right"
          [ariaLabel]="'NEXT_NEWS_ARIA' | translate"
          (onClick)="showNextNews()"
        ></p-button>
      </div>
    </div>
  } @else {
    <div class="news-empty">
      <h2 class="news-title">{{ 'NEWS' | translate }}</h2>
      <p class="news-date">{{ 'NEWS_EMPTY_DIALOG' | translate }}</p>
      <p-button label="{{ 'CLOSE' | translate }}" icon="pi pi-times" severity="secondary" (onClick)="closeDialog()"></p-button>
    </div>
  }
</div>
