<p-fieldset legend="{{ 'DETAILS' | translate }}" [toggleable]="true" class="mt-2">
  <div class="flex flex-col gap-2">
    <div class="flex flex-row w-full gap-2">
      <div class="w-14rem">
        <label for="idShort">{{ 'REPOSITORY' | translate }}</label>
      </div>
      <div class="flex flex-col gap-2 w-full">
        <p-select
          [options]="sourceOptions()"
          [(ngModel)]="selectedSource"
          class="w-full"
          class="w-full"
          optionLabel="label"
          appendTo="body"
          (ngModelChange)="loadAssetAdministrationShells()"
        ></p-select>
      </div>
    </div>
    @if (selectedSource?.url === 'custom') {
      <div class="flex flex-row w-full gap-2">
        <div class="w-14rem">
          <label for="idShort">{{ 'OTHER' | translate }}</label>
        </div>
        <div class="flex flex-col gap-2 w-full">
          <input pInputText [(ngModel)]="selectedCustomSource" />
        </div>
        <p-button
          icon="pi pi-search"
          (onClick)="loadAssetAdministrationShells(true)"
          label="{{ 'LOAD' | translate }}"
          [disabled]="selectedCustomSource == null || selectedCustomSource === ''"
        ></p-button>
      </div>
    }
    <p-table
      [value]="aasResults()"
      [loading]="loading"
      #resultsTable
      [paginator]="false"
      [showCurrentPageReport]="false"
    >
      <ng-template #header>
        <tr>
          <th scope="col">{{ 'ASSET_ID' | translate }}</th>
          <th scope="col">{{ 'ASSET_KIND' | translate }}</th>
          <th scope="col"></th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-result>
        <tr>
          <td>{{ result.globalAssetId }}</td>
          <td>{{ result.assetKind }}</td>
          <td>
            <p-button
              icon="pi pi-link-external"
              label="{{ 'APPLY' | translate }}"
              (onClick)="useAsset(result)"
            ></p-button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <td colspan="2">{{ 'NO_DATA_FOUND' | translate }}</td>
      </ng-template>
      <ng-template pTemplate="footer" let-columns>
        <tr>
          <td [attr.colspan]="3">
            <div class="flex flex-row gap-2 justify-center">
              <p-button
                label="{{ 'FIRST' | translate }}"
                icon="pi pi-angle-left"
                (onClick)="loadFirstPage()"
                [disabled]="firstPage()"
              ></p-button>
              <p-select
                [options]="pageOptions"
                [(ngModel)]="pageSize"
                appendTo="body"
                (ngModelChange)="loadFirstPage()"
              ></p-select>
              <p-button
                label="{{ 'NEXT' | translate }}"
                icon="pi pi-angle-right"
                iconPos="right"
                (onClick)="loadNextPage()"
                [disabled]="cursor == null || cursor === ''"
              ></p-button>
            </div>
          </td>
        </tr>
      </ng-template>
    </p-table>
    <div class="flex justify-end mt-3">
      <p-button label="{{ 'CANCEL' | translate }}" severity="secondary" (onClick)="closeDialog()"></p-button>
    </div>
  </div>
</p-fieldset>
