<div class="aas-splitter-layout">
  @if (loading()) {
    <p-splitter [panelSizes]="[20, 80]" class="aas-splitter-fill">
      <ng-template pTemplate>
        <div class="flex flex-col h-full text-base p-3 gap-3">
          <p-skeleton width="12rem" height="2rem"></p-skeleton>
          <p-skeleton width="100%" height="2.75rem"></p-skeleton>
          <p-skeleton width="92%" height="2.75rem"></p-skeleton>
          <p-skeleton width="96%" height="2.75rem"></p-skeleton>
          <p-skeleton width="88%" height="2.75rem"></p-skeleton>
          <p-skeleton width="90%" height="2.75rem"></p-skeleton>
        </div>
      </ng-template>
      <ng-template pTemplate>
        <div class="w-full h-full min-h-0 p-3 flex flex-col gap-3">
          <p-skeleton width="18rem" height="2rem"></p-skeleton>
          <p-skeleton width="100%" height="8rem"></p-skeleton>
          <p-skeleton width="100%" height="8rem"></p-skeleton>
        </div>
      </ng-template>
    </p-splitter>
  } @else {
    <p-splitter stateKey="systemManagementTree" stateStorage="local" [panelSizes]="[20, 80]" class="aas-splitter-fill">
      <ng-template pTemplate>
        <div class="flex h-full min-h-0 min-w-0 flex-col text-base">
          <div class="hero-section" style="margin: 0.5rem 0.5rem 0.5rem 0.5rem">
            <div class="hero-content">
              <h1 class="hero-title">{{ 'SYSTEM_MANAGEMENT' | translate }}</h1>
            </div>
          </div>
          <div class="min-w-0 flex-auto overflow-y-auto px-2 text-base">
            <aas-sidebar-tree-nav
              [items]="systemManagementEntries()"
              [selectedKey]="selectedEntryKey"
              (nodeSelected)="selectPage($event)"
            />
          </div>
        </div>
      </ng-template>
      <ng-template pTemplate>
        <div class="h-full min-h-0 min-w-0 w-full overflow-y-auto overflow-x-hidden p-2 text-base">
          <router-outlet></router-outlet>
        </div>
      </ng-template>
    </p-splitter>
  }
</div>
