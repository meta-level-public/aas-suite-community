<p-password
  type="text"
  id="password"
  name="password"
  class="w-full p-input-icon-right"
  class="innerFull"
  [(ngModel)]="passwordInput"
  [toggleMask]="true"
  [feedback]="true"
  #password="ngModel"
  pattern="^(?=.*\d)(?=.*[a-z])(?=.*[A-Z])(?=.*[a-zA-Z]).{8,}$"
  (ngModelChange)="setPassword()"
  vwsAutocompleteOff
  required
>
</p-password>
@if ((!password.valid && password.touched) || (password.errors != null && password.errors['pattern'])) {
  <div class="p-error">
    {{ 'PASSWORD_RECOMMENDATION' | translate }}
  </div>
}
@if (showOptions) {
  <div class="mt-2 flex gap-2">
    <p-button
      styleClass="p-button-secondary p-button-outlined p-button-sm"
      (onClick)="generatePassword()"
      icon="fa-solid fa-dice"
      label="{{ 'GENERATE_PASSWORD' | translate }}"
    ></p-button>
    <p-button
      styleClass="p-button-secondary p-button-outlined p-button-sm"
      (onClick)="copyPasswordToClipboard()"
      label="{{ 'COPY_PASSWORD' | translate }}"
      icon="pi pi-copy"
    ></p-button>
  </div>
}
