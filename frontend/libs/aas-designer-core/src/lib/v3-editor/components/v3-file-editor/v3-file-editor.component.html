@if (file != null && file.content != null) {
  <div class="flex flex-col gap-2">
    <p-fieldset
      [toggleable]="true"
      class="mt-2"
      [collapsed]="uiStateStore.detailsPanelCollapsed()"
      (collapsedChange)="uiStateStore.setDetailsPanelCollapsed($event)"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="DETAILS" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>
      <div class="flex flex-col gap-2">
        <aas-v3-id-short [element]="file" class="w-full" [shellResult]="shellResult"></aas-v3-id-short>
        <div class="flex flex-row w-full gap-2">
          <lib-help-label class="w-14rem mt-2" tag="DESCRIPTION"></lib-help-label>
          <aas-v3-lang-string-list
            [langStrings]="file.content.description"
            [langStringParent]="file.content"
            [langStringParentPropertyName]="'description'"
            class="w-full"
          ></aas-v3-lang-string-list>
        </div>
        <div class="flex flex-row w-full gap-2">
          <lib-help-label class="w-14rem mt-2" tag="DISPLAY_NAME"></lib-help-label>
          <aas-v3-lang-string-list
            [langStrings]="file.content.displayName"
            [langStringParent]="file.content"
            [langStringParentPropertyName]="'displayName'"
            class="w-full"
          ></aas-v3-lang-string-list>
        </div>
        <div class="flex flex-row w-full gap-2">
          <lib-help-label class="w-14rem mt-2" tag="VALUE"></lib-help-label>
          <input pInputText [(ngModel)]="file.content.value" class="w-full" nullIfEmpty />
        </div>
        <div class="flex flex-row w-full gap-2">
          <lib-help-label class="w-14rem mt-2" tag="CONTENT_TYPE"></lib-help-label>
          <input pInputText [(ngModel)]="file.content.contentType" class="w-full" />
        </div>
        <aas-v3-category [element]="file" class="w-full"></aas-v3-category>
      </div>
    </p-fieldset>
    <p-fieldset
      [toggleable]="true"
      [collapsed]="uiStateStore.contentPanelCollapsed()"
      (collapsedChange)="uiStateStore.setContentPanelCollapsed($event)"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="CONTENT" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>
      <aas-file-content-editor
        [shellResult]="shellResult"
        [fileValueIncoming]="file.content.value"
        (fileValueOutgoing)="file.content.value = $event ?? ''"
        [fileContentTypeIncoming]="file.content.contentType ?? ''"
        (fileContentTypeOutgoing)="file.content.contentType = $event"
        [semanticId]="file.content.semanticId"
      ></aas-file-content-editor>
    </p-fieldset>
    <!-- <p-fieldset legend="{{ 'EXTENSIONS' | translate }}" [toggleable]="true" [collapsed]="true">
      <aas-v3-extensions [extensions]="file.content.extensions" [extensionsParent]="file.content"></aas-v3-extensions>
    </p-fieldset> -->
    <p-fieldset
      [toggleable]="true"
      [collapsed]="uiStateStore.semanticIdPanelCollapsed()"
      (collapsedChange)="uiStateStore.setSemanticIdPanelCollapsed($event)"
      [ngClass]="{ 'border-error': hasSemanticErrors }"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="SEMANTIC_ID" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>
      <div class="flex flex-col gap-2">
        <aas-v3-semantic-description
          [semanticId]="file.content.semanticId"
          [supplemantalSemanticIds]="file.content.supplementalSemanticIds"
          [referenceParent]="file.content"
          [referenceParentPropertyName]="'semanticId'"
          [shellResult]="shellResult"
        ></aas-v3-semantic-description>
      </div>
    </p-fieldset>
    <p-fieldset
      [toggleable]="true"
      [collapsed]="uiStateStore.qualifiersPanelCollapsed()"
      (collapsedChange)="uiStateStore.setQualifiersPanelCollapsed($event)"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="QUALIFIER" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>
      <aas-v3-qualifiers [qualifiers]="file.content.qualifiers" [qualifiersParent]="file.content"></aas-v3-qualifiers>
    </p-fieldset>
    <p-fieldset
      [toggleable]="true"
      [collapsed]="uiStateStore.embeddedDataspecPanelCollapsed()"
      (collapsedChange)="uiStateStore.setEmbeddedDataspecPanelCollapsed($event)"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="EMBEDDED_DATA_SPECIFICATIONS" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>

      <aas-v3-embedded-data-specification
        [dataSpecification]="file.content.embeddedDataSpecifications"
        [dataSpecificationParent]="file.content"
        [shellResult]="shellResult"
      ></aas-v3-embedded-data-specification>
    </p-fieldset>

    <p-fieldset
      [toggleable]="true"
      [collapsed]="uiStateStore.endpointUrlPanelCollapsed()"
      (collapsedChange)="uiStateStore.setEndpointUrlPanelCollapsed($event)"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="ENDPOINT_URL" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>
      <aas-endpoint-url [element]="file" [shellResult]="shellResult"></aas-endpoint-url>
    </p-fieldset>
  </div>
}
