<p-table [value]="submodels()" [tableStyle]="{ 'min-width': '50rem' }" [loading]="loading()">
  <ng-template #header>
    <tr>
      <th scope="col" style="width: 10%; min-width: 3rem"></th>
      <th>{{ 'ID' | translate }}</th>
      <th>{{ 'ID_SHORT' | translate }}</th>
    </tr>
    <tr>
      <th scope="col" style="width: 10%; min-width: 3rem"></th>
      <th><p-columnFilter type="text" field="id" matchMode="contains"></p-columnFilter></th>
      <th><p-columnFilter type="text" field="idShort" matchMode="contains"></p-columnFilter></th>
    </tr>
  </ng-template>
  <ng-template #body let-cd>
    <tr>
      <td><p-button icon="pi pi-arrow-circle-right" outlined="true" (onClick)="applyCd(cd)"></p-button></td>
      <td>
        <div>{{ cd.id }}</div>
        @if (cd.hasDuplicateId) {
          <div class="text-xs text-orange-600">
            {{ 'DUPLICATE_ID_HINT' | translate: { index: cd.duplicateIndex, count: cd.duplicateCount } }}
          </div>
        }
      </td>
      <td>{{ cd.idShort }}</td>
    </tr>
  </ng-template>
  <ng-template #footer let-columns>
    <tr>
      <td [attr.colspan]="3">
        <div class="flex flex-row gap-2 justify-center">
          <p-button
            label="{{ 'FIRST' | translate }}"
            icon="pi pi-angle-left"
            (onClick)="loadFirstPage()"
            [disabled]="firstPage()"
          ></p-button>
          <p-select
            [options]="pageOptions"
            [(ngModel)]="pageSize"
            appendTo="body"
            (ngModelChange)="loadFirstPage()"
          ></p-select>
          <p-button
            label="{{ 'NEXT' | translate }}"
            icon="pi pi-angle-right"
            iconPos="right"
            (onClick)="loadNextPage()"
            [disabled]="cursor == null"
          ></p-button>
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
