@if (capability != null && capability.content != null) {
  <div class="flex flex-col gap-2">
    <p-fieldset
      [toggleable]="true"
      class="mt-2"
      [collapsed]="uiStateStore.detailsPanelCollapsed()"
      (collapsedChange)="uiStateStore.setDetailsPanelCollapsed($event)"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="DETAILS" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>
      <div class="flex flex-col gap-2">
        <aas-v3-id-short [element]="capability" class="w-full" [shellResult]="shellResult"></aas-v3-id-short>
        <div class="flex flex-row w-full gap-2">
          <lib-help-label class="w-14rem mt-2" tag="DESCRIPTION"></lib-help-label>
          <aas-v3-lang-string-list
            [langStrings]="capability.content.description"
            [langStringParent]="capability.content"
            [langStringParentPropertyName]="'description'"
            class="w-full"
          ></aas-v3-lang-string-list>
        </div>
        <div class="flex flex-row w-full gap-2">
          <lib-help-label class="w-14rem mt-2" tag="DISPLAY_NAME"></lib-help-label>
          <aas-v3-lang-string-list
            [langStrings]="capability.content.displayName"
            [langStringParent]="capability.content"
            [langStringParentPropertyName]="'displayName'"
            class="w-full"
          ></aas-v3-lang-string-list>
        </div>
        <aas-v3-category [element]="capability" class="w-full"></aas-v3-category>
      </div>
    </p-fieldset>
    <p-fieldset
      [toggleable]="true"
      [collapsed]="uiStateStore.semanticIdPanelCollapsed()"
      (collapsedChange)="uiStateStore.setSemanticIdPanelCollapsed($event)"
      [ngClass]="{ 'border-error': hasSemanticErrors }"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="SEMANTIC_ID" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>
      <aas-v3-semantic-description
        [semanticId]="capability.content.semanticId"
        [supplemantalSemanticIds]="capability.content.supplementalSemanticIds"
        [referenceParent]="capability.content"
        [referenceParentPropertyName]="'semanticId'"
        [shellResult]="shellResult"
      ></aas-v3-semantic-description>
    </p-fieldset>
    <p-fieldset
      [toggleable]="true"
      [collapsed]="uiStateStore.qualifiersPanelCollapsed()"
      (collapsedChange)="uiStateStore.setQualifiersPanelCollapsed($event)"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="QUALIFIERS" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>
      <aas-v3-qualifiers
        [qualifiers]="capability.content.qualifiers"
        [qualifiersParent]="capability.content"
      ></aas-v3-qualifiers>
    </p-fieldset>
    <p-fieldset
      [toggleable]="true"
      [collapsed]="uiStateStore.embeddedDataspecPanelCollapsed()"
      (collapsedChange)="uiStateStore.setEmbeddedDataspecPanelCollapsed($event)"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="EMBEDDED_DATA_SPECIFICATIONS" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>
      <aas-v3-embedded-data-specification
        [dataSpecification]="capability.content.embeddedDataSpecifications"
        [dataSpecificationParent]="capability.content"
        [shellResult]="shellResult"
      ></aas-v3-embedded-data-specification>
    </p-fieldset>

    <p-fieldset
      [toggleable]="true"
      [collapsed]="uiStateStore.endpointUrlPanelCollapsed()"
      (collapsedChange)="uiStateStore.setEndpointUrlPanelCollapsed($event)"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="ENDPOINT_URL" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>
      <aas-endpoint-url [element]="capability" [shellResult]="shellResult"></aas-endpoint-url>
    </p-fieldset>
  </div>
}
