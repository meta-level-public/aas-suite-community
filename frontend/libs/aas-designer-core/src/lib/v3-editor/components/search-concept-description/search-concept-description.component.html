<p-table #cdTable [value]="conceptDescriptions()" [tableStyle]="{ 'min-width': '50rem' }" [loading]="loading()">
  <ng-template #header>
    <tr>
      <th>{{ 'ID' | translate }}</th>
      <th>{{ 'ID_SHORT' | translate }}</th>
      <th>{{ 'DEFINITION' | translate }}</th>
      <th>{{ 'PREFERRED_NAME' | translate }}</th>
      <th>{{ 'SOURCE_OF_DEFINITION' | translate }}</th>
      <th scope="col" style="width: 10%; min-width: 3rem"></th>
    </tr>
    <tr>
      <th scope="col" style="width: 10%; min-width: 3rem"></th>
      <th><p-columnFilter type="text" field="id" matchMode="contains"></p-columnFilter></th>
      <th><p-columnFilter type="text" field="idShort" matchMode="contains"></p-columnFilter></th>
      <th></th>
      <th></th>
      <th></th>
    </tr>
  </ng-template>
  <ng-template #body let-cd>
    <tr>
      <td><p-button label="{{ 'APPLY' | translate }}" (onClick)="applyCd(cd)" size="small"></p-button></td>
      <td>{{ cd.id }}</td>
      <td>{{ cd.idShort }}</td>
      <td>{{ getPreferredName(cd) }}</td>
      <td>{{ getDefinition(cd) }}</td>
      <td>{{ getSourceOfDefinition(cd) }}</td>
    </tr>
  </ng-template>
  <ng-template #footer let-columns>
    <tr>
      <td [attr.colspan]="8">
        <div class="flex flex-row gap-2 justify-center">
          <p-button
            label="{{ 'FIRST' | translate }}"
            icon="pi pi-angle-left"
            (onClick)="loadFirstPage()"
            [disabled]="firstPage()"
          ></p-button>
          <p-select
            [options]="pageOptions"
            [(ngModel)]="pageSize"
            appendTo="body"
            (ngModelChange)="loadFirstPage()"
          ></p-select>
          <p-button
            label="{{ 'NEXT' | translate }}"
            icon="pi pi-angle-right"
            iconPos="right"
            (onClick)="loadNextPage()"
            [disabled]="cursor == null"
          ></p-button>
        </div>
      </td>
    </tr>
  </ng-template>
</p-table>
