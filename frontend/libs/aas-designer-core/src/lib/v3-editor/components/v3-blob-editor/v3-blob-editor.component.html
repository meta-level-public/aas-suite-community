@if (blob != null && blob.content != null) {
  <div class="flex flex-col gap-2">
    <p-fieldset
      [toggleable]="true"
      class="mt-2"
      [collapsed]="uiStateStore.detailsPanelCollapsed()"
      (collapsedChange)="uiStateStore.setDetailsPanelCollapsed($event)"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="DETAILS" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>

      <div class="flex flex-col gap-2">
        <aas-v3-id-short [element]="blob" class="w-full" [shellResult]="shellResult"></aas-v3-id-short>
        <div class="flex flex-row w-full gap-2">
          <lib-help-label class="w-14rem mt-2" tag="DESCRIPTION"></lib-help-label>
          <aas-v3-lang-string-list
            [langStrings]="blob.content.description"
            [langStringParent]="blob.content"
            [langStringParentPropertyName]="'description'"
            class="w-full"
          ></aas-v3-lang-string-list>
        </div>
        <div class="flex flex-row w-full gap-2">
          <lib-help-label class="w-14rem mt-2" tag="DISPLAY_NAME"></lib-help-label>
          <aas-v3-lang-string-list
            [langStrings]="blob.content.displayName"
            [langStringParent]="blob.content"
            [langStringParentPropertyName]="'displayName'"
            class="w-full"
          ></aas-v3-lang-string-list>
        </div>
        <!-- <div class="flex flex-row w-full gap-2">
        <lib-help-label class="w-14rem mt-2" tag="VALUE"></lib-help-label>
        <input pInputText [(ngModel)]="blob.content.value" class="w-full" nullIfEmpty />
      </div>
      <div class="flex flex-row w-full gap-2">
        <lib-help-label class="w-14rem mt-2" tag="CONTENT_TYPE"></lib-help-label>
        <input pInputText [(ngModel)]="blob.content.contentType" class="w-full" nullIfEmpty />
      </div> -->
      </div>
    </p-fieldset>

    <p-fieldset
      [toggleable]="true"
      class="mt-2"
      [collapsed]="uiStateStore.detailsPanelCollapsed()"
      (collapsedChange)="uiStateStore.setDetailsPanelCollapsed($event)"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="DETAILS" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>
      @if (blob.content.value != null) {
        <aas-blob-content-viewer
          [blobValue]="blob.content.value"
          [contentType]="blob.content.contentType ?? ''"
          [blobIdShort]="blob.content.idShort ?? ''"
        ></aas-blob-content-viewer>
      }
    </p-fieldset>

    <!-- <p-fieldset legend="{{ 'EXTENSIONS' | translate }}" [toggleable]="true" [collapsed]="true">
      <aas-v3-extensions [extensions]="file.content.extensions" [extensionsParent]="file.content"></aas-v3-extensions>
    </p-fieldset> -->
    <p-fieldset
      [toggleable]="true"
      [ngClass]="{ 'border-error': hasSemanticErrors }"
      [collapsed]="uiStateStore.semanticIdPanelCollapsed()"
      (collapsedChange)="uiStateStore.setSemanticIdPanelCollapsed($event)"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="SEMANTIC_ID" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>

      <div class="flex flex-col gap-2">
        <aas-v3-semantic-description
          [semanticId]="blob.content.semanticId"
          [supplemantalSemanticIds]="blob.content.supplementalSemanticIds"
          [referenceParent]="blob.content"
          [referenceParentPropertyName]="'semanticId'"
          [shellResult]="shellResult"
        ></aas-v3-semantic-description>
      </div>
    </p-fieldset>
    <p-fieldset
      [toggleable]="true"
      [collapsed]="uiStateStore.qualifiersPanelCollapsed()"
      (collapsedChange)="uiStateStore.setQualifiersPanelCollapsed($event)"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="QUALIFIERS" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>

      <aas-v3-qualifiers [qualifiers]="blob.content.qualifiers" [qualifiersParent]="blob.content"></aas-v3-qualifiers>
    </p-fieldset>
  </div>
}
