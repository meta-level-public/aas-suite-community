@if (property != null && property.content != null) {
  <div class="flex flex-col gap-2">
    <p-fieldset
      [toggleable]="true"
      class="mt-2"
      [collapsed]="uiStateStore.detailsPanelCollapsed()"
      (collapsedChange)="uiStateStore.setDetailsPanelCollapsed($event)"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="DETAILS" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>
      <div class="flex flex-col gap-2">
        <aas-v3-id-short [element]="property" class="w-full" [shellResult]="shellResult"></aas-v3-id-short>
        <div class="flex flex-row w-full gap-2">
          <lib-help-label class="w-14rem mt-2" tag="DESCRIPTION"></lib-help-label>
          <aas-v3-lang-string-list
            [langStrings]="property.content.description"
            [langStringParent]="property.content"
            [langStringParentPropertyName]="'description'"
            class="w-full"
          ></aas-v3-lang-string-list>
        </div>
        <div class="flex flex-row w-full gap-2">
          <lib-help-label class="w-14rem mt-2" tag="DISPLAY_NAME"></lib-help-label>
          <aas-v3-lang-string-list
            [langStrings]="property.content.displayName"
            [langStringParent]="property.content"
            [langStringParentPropertyName]="'displayName'"
            class="w-full"
          ></aas-v3-lang-string-list>
        </div>
        <aas-v3-category [element]="property" class="w-full"></aas-v3-category>
      </div>
    </p-fieldset>
    <p-fieldset
      [toggleable]="true"
      class="mt-2"
      [ngClass]="{ 'border-error': hasContentErrors }"
      [collapsed]="uiStateStore.contentPanelCollapsed()"
      (collapsedChange)="uiStateStore.setContentPanelCollapsed($event)"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="CONTENT" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>
      <div class="flex flex-col gap-2">
        <div class="flex flex-row w-full gap-2">
          <lib-help-label class="w-14rem mt-2" tag="VALUE"></lib-help-label>
          <div class="flex flex-col gap-2 w-full">
            @if (isProductFamily) {
              <div class="mb-4">
                <lib-help-label class="w-14rem mt-2" tag="SELECT_PRODUCT_FAMILY"></lib-help-label>
                <div class="flex flex-row gap-2 justify-between">
                  <p-select
                    [options]="families()"
                    class="w-full"
                    class="w-full"
                    optionLabel="name"
                    [(ngModel)]="selectedFamily"
                    [filter]="true"
                    [placeholder]="'PLEASE_SELECT' | translate"
                    vwsUndo
                  >
                  </p-select>
                  <p-button
                    label="{{ 'APPLY' | translate }}"
                    class="w-20rem"
                    (onClick)="applyFamily()"
                    size="small"
                  ></p-button>
                </div>
                <p-divider>{{ 'OR' | translate }}</p-divider>
              </div>
            }
            @if (isProductRoot) {
              <div class="mb-4">
                <lib-help-label class="w-14rem mt-2" tag="SELECT_PRODUCT_ROOT"></lib-help-label>
                <div class="flex flex-row gap-2 justify-between">
                  <p-select
                    [options]="roots()"
                    class="w-full"
                    class="w-full"
                    optionLabel="name"
                    [(ngModel)]="selectedRoot"
                    [filter]="true"
                    [placeholder]="'PLEASE_SELECT' | translate"
                    vwsUndo
                  >
                  </p-select>
                  <p-button
                    label="{{ 'APPLY' | translate }}"
                    class="w-20rem"
                    (onClick)="applyRoot()"
                    size="small"
                  ></p-button>
                </div>
                <p-divider>{{ 'OR' | translate }}</p-divider>
              </div>
            }
            @if (isProductDesignation) {
              <div class="mb-4">
                <lib-help-label class="w-14rem mt-2" tag="SELECT_PRODUCT_DESIGNATION"></lib-help-label>
                <div class="flex flex-row gap-2 justify-between">
                  <p-select
                    [options]="designations()"
                    class="w-full"
                    class="w-full"
                    optionLabel="name"
                    [(ngModel)]="selectedDesignation"
                    [filter]="true"
                    [placeholder]="'PLEASE_SELECT' | translate"
                    vwsUndo
                  >
                  </p-select>
                  <p-button
                    label="{{ 'APPLY' | translate }}"
                    class="w-20rem"
                    (onClick)="applyDesignation()"
                    size="small"
                  ></p-button>
                </div>
                <p-divider>{{ 'OR' | translate }}</p-divider>
              </div>
            }

            <aas-v3-lang-string-list
              [langStrings]="property.content.value"
              [langStringParent]="property.content"
              [langStringParentPropertyName]="'value'"
              class="w-full"
            ></aas-v3-lang-string-list>
          </div>
        </div>
        <div class="flex flex-row w-full gap-2">
          <lib-help-label class="w-14rem mt-2" tag="VALUE_ID"></lib-help-label>
          <aas-v3-value-id [property]="property" class="flex flex-col w-full"></aas-v3-value-id>
        </div>
      </div>
    </p-fieldset>
    <!-- <p-fieldset legend="{{ 'EXTENSIONS' | translate }}" [toggleable]="true" [collapsed]="true">
    <aas-v3-extensions
      [extensions]="property.content.extensions"
      [extensionsParent]="property.content"
    ></aas-v3-extensions>
  </p-fieldset> -->
    <p-fieldset
      [toggleable]="true"
      [collapsed]="uiStateStore.semanticIdPanelCollapsed()"
      (collapsedChange)="uiStateStore.setSemanticIdPanelCollapsed($event)"
      [ngClass]="{ 'border-error': hasSemanticErrors }"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="SEMANTIC_ID" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>
      <aas-v3-semantic-description
        [semanticId]="property.content.semanticId"
        [supplemantalSemanticIds]="property.content.supplementalSemanticIds"
        [referenceParent]="property.content"
        [referenceParentPropertyName]="'semanticId'"
        [shellResult]="shellResult"
      ></aas-v3-semantic-description>
    </p-fieldset>
    <p-fieldset legend="{{ 'QUALIFIERS' | translate }}" [toggleable]="true" [collapsed]="true">
      <aas-v3-qualifiers
        [qualifiers]="property.content.qualifiers"
        [qualifiersParent]="property.content"
      ></aas-v3-qualifiers>
    </p-fieldset>
    <p-fieldset
      [toggleable]="true"
      [collapsed]="uiStateStore.embeddedDataspecPanelCollapsed()"
      (collapsedChange)="uiStateStore.setEmbeddedDataspecPanelCollapsed($event)"
      [ngClass]="{ 'border-error': hasDataSpecErrors }"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="EMBEDDED_DATA_SPECIFICATIONS" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>
      <aas-v3-embedded-data-specification
        [dataSpecification]="property.content.embeddedDataSpecifications"
        [dataSpecificationParent]="property.content"
        [shellResult]="shellResult"
      ></aas-v3-embedded-data-specification>
    </p-fieldset>

    <p-fieldset
      [toggleable]="true"
      [collapsed]="uiStateStore.endpointUrlPanelCollapsed()"
      (collapsedChange)="uiStateStore.setEndpointUrlPanelCollapsed($event)"
    >
      <ng-template #header>
        <div class="flex items-center gap-2 px-2">
          <lib-help-label tag="ENDPOINT_URL" isLabelBold="true"></lib-help-label>
        </div>
      </ng-template>
      <aas-endpoint-url [element]="property" [shellResult]="shellResult"></aas-endpoint-url>
    </p-fieldset>
  </div>
}
