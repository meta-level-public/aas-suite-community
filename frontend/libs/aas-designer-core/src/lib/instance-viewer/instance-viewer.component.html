<div class="card flex flex-col">
  <p-toolbar>
    <ng-template #start>
      <!-- <p-button icon="pi pi-plus" class="mr-2"/>
    <p-button icon="pi pi-print" class="mr-2"/>
    <p-button icon="pi pi-upload" /> -->
    </ng-template>
    <ng-template #center>
      <div style="width: 100rem">
        <p-inputGroup>
          <p-inputGroupAddon>{{ 'INSTANCE_VIEWER_URL_OR_IP' | translate }}</p-inputGroupAddon>
          <input pInputText [(ngModel)]="inputUrl" (keydown.enter)="loadData()" appendTo="body" /><p-button
            icon="pi pi-search"
            (onClick)="loadData()"
            [disabled]="inputUrl() === ''"
            class="w-120rem"
          ></p-button>
        </p-inputGroup>
      </div>
    </ng-template>
    <ng-template #end>
      <!-- <p-splitButton label="Save" icon="pi pi-check" [model]="items" /> -->
    </ng-template>
  </p-toolbar>

  <div class="card flex flex-col">
    @if (aasId() !== '' && url() !== '') {
      <aas-aas-viewer-standalone
        [currentLanguage]="translate.currentLang"
        [viewerDescriptor]="descriptor() | async"
      ></aas-aas-viewer-standalone>
    }
  </div>
</div>
