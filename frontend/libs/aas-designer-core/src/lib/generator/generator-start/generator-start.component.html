<div class="aas-page-surface">
  <div class="hero-section aas-page-header-inset flex-shrink-0">
    <div class="hero-content">
      <h1 class="hero-title">{{ 'GUIDED_MODE' | translate }}</h1>
    </div>
  </div>

  <div class="flex-1 min-h-0">
    <div class="h-full viewer-content-area rounded-lg pt-4 flex flex-col min-h-0 overflow-hidden">
      @if (showStepper) {
        <div class="generator-main-steps mb-4 flex-shrink-0 px-4">
          <p-steps [model]="items" [readonly]="false"></p-steps>
        </div>
      }
      <div class="relative flex-1 min-h-0 px-4">
        <div class="absolute inset-0 overflow-y-auto px-4 pb-4">
          <div class="generator-route-host-inner min-h-full flex flex-col">
            <router-outlet></router-outlet>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
