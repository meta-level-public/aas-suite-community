<div class="hero-section flex-shrink-0">
  <div class="hero-content">
    <div class="flex w-full justify-between">
      <p-button label="{{ 'BACK' | translate }}" icon="pi pi-arrow-left" (onClick)="back()"></p-button>
      <div class="flex gap-2">
        <p-button
          styleClass="p-button-help"
          label="{{ 'DOWNLOAD' | translate }}"
          icon="pi pi-download"
          (onClick)="download()"
        ></p-button>
        @if (isEditable()) {
          <p-button label="{{ 'EDIT_MODE' | translate }}" icon="pi pi-pencil" (onClick)="goToEditMode()"></p-button>
        }
      </div>
    </div>
  </div>
</div>
<div class="flex flex-col flex-auto w-full min-h-0">
  <div class="flex-auto min-h-0 relative">
    <div class="absolute inset-0 overflow-auto viewer-content-area rounded-lg p-4">
      <aas-aas-viewer-standalone
        [currentLanguage]="languageService.userLanguage"
        [viewerDescriptor]="descriptor()"
      ></aas-aas-viewer-standalone>
    </div>
  </div>
  <aas-aasx-export #exportComponent></aas-aasx-export>
</div>
