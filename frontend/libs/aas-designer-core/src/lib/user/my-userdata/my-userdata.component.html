<div class="flex-auto">
  <div style="position: relative; height: 100%">
    <div style="position: absolute; height: 100%; width: 100%">
      <p-splitter stateKey="profileTree" stateStorage="local" [panelSizes]="[20, 80]" class="flex h-full">
        <ng-template pTemplate>
          <div class="flex flex-col h-full text-base">
            <div class="hero-section" style="margin: 0.5rem 0.5rem 0.5rem 0.5rem">
              <div class="hero-content">
                <h1 class="hero-title">{{ 'MY_AREA' | translate }}</h1>
              </div>
            </div>
            <div class="flex-auto overflow-y-auto px-2 text-base">
              <aas-sidebar-tree-nav
                [items]="areas()"
                [selectedKey]="selectedNodeKey"
                (nodeSelected)="selectPage($event)"
              />
            </div>
          </div>
        </ng-template>
        <ng-template pTemplate>
          <div class="w-full h-full p-2 text-base">
            <router-outlet class="mb-5"></router-outlet>
          </div>
        </ng-template>
      </p-splitter>
    </div>
  </div>
</div>
