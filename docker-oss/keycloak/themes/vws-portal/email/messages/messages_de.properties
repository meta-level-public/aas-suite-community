passwordResetBodyHtml=<p>Für Ihr AAS Designer-Konto wurde eine Zurücksetzung des Passworts angefordert. Wenn Sie das waren, öffnen Sie den folgenden Link, um ein neues Passwort zu vergeben.</p><p><a href="{0}">Passwort für AAS Designer zurücksetzen</a></p><p>Dieser Link ist noch {3} gültig.</p><p>Falls Sie keine Zurücksetzung angefordert haben, können Sie diese E-Mail ignorieren. Ihr Passwort bleibt dann unverändert.</p>