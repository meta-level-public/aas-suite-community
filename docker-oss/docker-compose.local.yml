    container_name: submodelrepository-go
    ports:
      - "5085:8081"
    environment:
      CORS_ALLOWEDORIGINS: "*"
      CORS_ALLOWEDHEADERS: "*"
      CORS_ALLOWEDCREDENTIALS: "true"
      CORS_ALLOWEDMETHODS: GET,POST,PUT,PATCH,DELETE,OPTIONS
