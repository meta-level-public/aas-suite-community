name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  FAIL_ON_SECURITY_FINDINGS: "false"
  ENABLE_GITHUB_CODE_SCANNING_UPLOAD: "false"
  SYFT_VERSION: v1.20.0
  TRIVY_VERSION: v0.69.3

jobs:
  check-services-format:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: Restore local .NET tools
        run: dotnet tool restore --tool-manifest .config/dotnet-tools.json

      - name: Check services formatting
        run: dotnet tool run csharpier check services --ignore-path .csharpierignore --compilation-errors-as-warnings

  dependency-security:
    needs: check-services-format
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: ./global.json

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run dependency vulnerability scans
        shell: bash
        run: |
          set -euo pipefail

          OUT_DIR="$RUNNER_TEMP/security"
          mkdir -p "$OUT_DIR"

          CS_PROJS=(
            "services/gateway/gateway.csproj"
            "services/feed-mapping/feed-mapping.csproj"
            "services/health-dashboard/health-dashboard.csproj"
            "services/aas-designer/AasDesignerApi.Community/AasDesignerApi.Community.csproj"
            "services/aas-designer/AasDesignerApi.Enterprise/AasDesignerApi.Enterprise.csproj"
            "services/aas-designer/AasDesignerEnterpriseLicensing/AasDesignerEnterpriseLicensing.csproj"
            "services/aas-designer/AasDesignerEnterpriseSystemManagementApi/AasDesignerEnterpriseSystemManagementApi.csproj"
          )

          for proj in "${CS_PROJS[@]}"; do
            base="$(basename "$proj" .csproj)"
            echo "[nuget-vuln] $proj"
            dotnet list "$proj" package --vulnerable --include-transitive --format json > "$OUT_DIR/nuget-$base.json" || true
          done

          corepack enable
          pushd frontend >/dev/null
          pnpm install --frozen-lockfile
          pnpm audit --json > "$OUT_DIR/frontend-pnpm-audit.json" || true
          popd >/dev/null

          if [ "${FAIL_ON_SECURITY_FINDINGS}" = "true" ]; then
            if [ -f "$OUT_DIR/frontend-pnpm-audit.json" ] && grep -Eiq '"(high|critical)"' "$OUT_DIR/frontend-pnpm-audit.json"; then
              echo "High/Critical frontend vulnerabilities detected."
              exit 1
            fi

            if compgen -G "$OUT_DIR/nuget-*.json" > /dev/null && grep -Eiq '"severity"[[:space:]]*:[[:space:]]*"(High|Critical)"' "$OUT_DIR"/nuget-*.json; then
              echo "High/Critical NuGet vulnerabilities detected."
              exit 1
            fi
          fi

      - name: Upload dependency security reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            ${{ runner.temp }}/security/*.json
          if-no-files-found: warn

  source-sbom:
    needs: check-services-format
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install syft
        shell: bash
        run: |
          set -euo pipefail
          BIN_DIR="$RUNNER_TEMP/bin"
          mkdir -p "$BIN_DIR"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$BIN_DIR" "${SYFT_VERSION}"
          echo "$BIN_DIR" >> "$GITHUB_PATH"
          "$BIN_DIR/syft" version

      - name: Generate source SBOM
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="$RUNNER_TEMP/sbom"
          mkdir -p "$OUT_DIR"
          syft "dir:${GITHUB_WORKSPACE}" -o cyclonedx-json > "$OUT_DIR/source.cyclonedx.json"

      - name: Upload source SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-source
          path: ${{ runner.temp }}/sbom/source.cyclonedx.json
          if-no-files-found: error

  build-frontend:
    needs: check-services-format
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/aas-designer-frontend-community
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./docker-oss/frontend.Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-designer-backend:
    needs: check-services-format
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/aas-designer-backend-community
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Community Backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./services/aas-designer/Dockerfile.community
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-gateway:
    needs: check-services-format
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/aas-designer-gateway
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push Gateway
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./services/gateway/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  container-security:
    needs:
      - build-frontend
      - build-designer-backend
      - build-gateway
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        image:
          - name: aas-designer-frontend-community
            dockerfile: ./docker-oss/frontend.Dockerfile
          - name: aas-designer-backend-community
            dockerfile: ./services/aas-designer/Dockerfile.community
          - name: aas-designer-gateway
            dockerfile: ./services/gateway/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install syft and trivy
        shell: bash
        run: |
          set -euo pipefail
          BIN_DIR="$RUNNER_TEMP/bin"
          mkdir -p "$BIN_DIR"
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b "$BIN_DIR" "${SYFT_VERSION}"
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b "$BIN_DIR" "${TRIVY_VERSION}"
          echo "$BIN_DIR" >> "$GITHUB_PATH"
          "$BIN_DIR/syft" version
          "$BIN_DIR/trivy" --version

      - name: Build image for scanning
        shell: bash
        run: |
          set -euo pipefail
          docker build \
            -f "${{ matrix.image.dockerfile }}" \
            -t "local/${{ matrix.image.name }}:${{ github.sha }}" \
            .

      - name: Generate image SBOM
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="$RUNNER_TEMP/sbom"
          mkdir -p "$OUT_DIR"
          syft "local/${{ matrix.image.name }}:${{ github.sha }}" -o cyclonedx-json > "$OUT_DIR/${{ matrix.image.name }}.cyclonedx.json"

      - name: Generate Trivy SARIF
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="$RUNNER_TEMP/trivy"
          mkdir -p "$OUT_DIR"

          if ! trivy image --ignore-unfixed --severity HIGH,CRITICAL --format sarif --output "$OUT_DIR/${{ matrix.image.name }}.sarif" "local/${{ matrix.image.name }}:${{ github.sha }}"; then
            printf '%s\n' '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"trivy","rules":[]}},"results":[]}]}' > "$OUT_DIR/${{ matrix.image.name }}.sarif"
          fi

      - name: Enforce image security threshold
        if: env.FAIL_ON_SECURITY_FINDINGS == 'true'
        shell: bash
        run: |
          set -euo pipefail
          trivy image --ignore-unfixed --severity HIGH,CRITICAL --exit-code 1 "local/${{ matrix.image.name }}:${{ github.sha }}"

      - name: Upload Trivy SARIF
        if: github.event_name == 'push' && env.ENABLE_GITHUB_CODE_SCANNING_UPLOAD == 'true'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ runner.temp }}/trivy/${{ matrix.image.name }}.sarif
          category: trivy-${{ matrix.image.name }}

      - name: Upload container security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-${{ matrix.image.name }}
          path: |
            ${{ runner.temp }}/trivy/${{ matrix.image.name }}.sarif
            ${{ runner.temp }}/sbom/${{ matrix.image.name }}.cyclonedx.json
          if-no-files-found: error
