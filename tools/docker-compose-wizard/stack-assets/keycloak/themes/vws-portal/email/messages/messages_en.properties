passwordResetBody=A password reset was requested for your AAS Designer account. If this was you, open the link below to choose a new password.\n\n{0}\n\nThis link will remain valid for {3}.\n\nIf you did not request a password reset, you can ignore this email and your password will remain unchanged.
passwordResetBodyHtml=<p>A password reset was requested for your AAS Designer account. If this was you, open the link below to choose a new password.</p><p><a href="{0}">Reset your AAS Designer password</a></p><p>This link will remain valid for {3}.</p><p>If you did not request a password reset, you can ignore this email and your password will remain unchanged.</p>